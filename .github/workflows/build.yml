name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip version bump]') }}
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump app version [skip version bump]"
          git push origin HEAD:main
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build React Website
        run: npm run build
        
      - name: Build and Publish Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP: true
        # The cross-env flag inside scripts might get tricky, so we explicitly call electron-builder and pass publish
        run: npx electron-builder --win --publish always
